name: CI

on:
  push:
    branches: [develop, staging, master]
  pull_request:
    branches: [develop, staging, master]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - name: Checkout Fuel
        uses: actions/checkout@v4

      - name: Checkout RockitCompiler
        uses: actions/checkout@v4
        with:
          repository: Dark-Matter/moon
          path: rockit-compiler
          token: ${{ secrets.REPO_TOKEN }}

      - name: Build Stage 1 compiler
        run: |
          cd rockit-compiler/RockitCompiler
          swift run rockit build-native Stage1/command.rok

      - name: Build Fuel
        run: |
          COMPILER="rockit-compiler/RockitCompiler/Stage1/command"
          RUNTIME="rockit-compiler/RockitCompiler/Runtime/rockit_runtime.c"
          $COMPILER build-native src/fuel.rok -o fuel --runtime-path $RUNTIME

      - name: Test — fuel version
        run: ./fuel version | grep -q "0.1.0"

      - name: Test — fuel help
        run: ./fuel help

      - name: Test — fuel init
        run: |
          cd /tmp
          $GITHUB_WORKSPACE/fuel init test-project
          test -f test-project/Fuel.toml
          test -f test-project/src/main.rok
          test -f test-project/README.md
          grep -q "test-project" test-project/Fuel.toml

      - name: Test — fuel build
        run: |
          cd /tmp/test-project
          COMPILER="$GITHUB_WORKSPACE/rockit-compiler/RockitCompiler/Stage1/command"
          RUNTIME="$GITHUB_WORKSPACE/rockit-compiler/RockitCompiler/Runtime/rockit_runtime.c"
          $GITHUB_WORKSPACE/fuel build --compiler-path $COMPILER --runtime-path $RUNTIME
          test -f build/test-project

      - name: Test — fuel run
        run: |
          cd /tmp/test-project
          COMPILER="$GITHUB_WORKSPACE/rockit-compiler/RockitCompiler/Stage1/command"
          RUNTIME="$GITHUB_WORKSPACE/rockit-compiler/RockitCompiler/Runtime/rockit_runtime.c"
          $GITHUB_WORKSPACE/fuel run --compiler-path $COMPILER --runtime-path $RUNTIME 2>&1 | grep -q "Hello, Rockit!"

      - name: Test — error no Fuel.toml
        run: |
          cd /tmp
          $GITHUB_WORKSPACE/fuel build 2>&1 | grep -q "Fuel.toml"

      - name: Test — error unknown command
        run: ./fuel badcommand 2>&1 | grep -q "unknown command"
