name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    container: swift:5.10.1-jammy
    defaults:
      run:
        shell: bash

    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y git clang-15 curl jq libssl-dev pkg-config
          ln -sf /usr/bin/clang-15 /usr/bin/clang

      - name: Checkout
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          echo "machine ${GITHUB_SERVER_URL#https://} login x-access-token password ${GITHUB_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git clone --depth 1 --branch "${BRANCH}" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" .
        env:
          GITHUB_TOKEN: ${{ gitea.token }}

      - name: Set version
        run: |
          VERSION=$(grep -oP 'FUEL_VERSION\(\).*?"(\K[0-9]+\.[0-9]+\.[0-9]+)' src/fuel.rok || echo "0.0.0")
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG=v${VERSION}" >> "$GITHUB_ENV"
          echo "Releasing version: ${VERSION}"

      - name: Build Rockit compiler from source
        run: |
          git clone --depth 1 https://github.com/dark-matter-tech/rockit-booster.git /tmp/stage0
          cd /tmp/stage0 && swift build -c release

          git clone --depth 1 --recurse-submodules https://github.com/dark-matter-tech/rockit-compiler.git /tmp/rockit-compiler

          cd /tmp/rockit-compiler && bash src/build.sh
          /tmp/stage0/.build/release/rockit build-native src/command.rok -o /tmp/stage1

          cd /tmp/rockit-compiler && bash runtime/rockit/build.sh

          chmod +x /tmp/stage1
          echo "COMPILER=/tmp/stage1" >> "$GITHUB_ENV"
          echo "RUNTIME=/tmp/rockit-compiler/runtime/rockit_runtime.o" >> "$GITHUB_ENV"
          /tmp/stage1 version

      - name: Build Fuel
        run: |
          $COMPILER build-native src/fuel.rok -o fuel --runtime-path $RUNTIME
          ./fuel version

      - name: Package Linux x86_64
        run: |
          ARCHIVE="fuel-${VERSION}-linux-x86_64.tar.gz"
          mkdir -p dist/fuel-${VERSION}-linux-x86_64/fuel/bin
          cp fuel dist/fuel-${VERSION}-linux-x86_64/fuel/bin/fuel
          chmod +x dist/fuel-${VERSION}-linux-x86_64/fuel/bin/fuel
          cd dist && tar -czf "${ARCHIVE}" "fuel-${VERSION}-linux-x86_64"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
          ls -la "${ARCHIVE}"

      - name: Upload to release
        run: |
          API="${GITHUB_SERVER_URL}/api/v1"
          ARCHIVE="fuel-${VERSION}-linux-x86_64.tar.gz"

          RELEASE_ID=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" \
            "${API}/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" \
            | jq -r '.id // empty')

          if [ -z "$RELEASE_ID" ]; then
            RELEASE_ID=$(curl -s -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Content-Type: application/json" \
              "${API}/repos/${GITHUB_REPOSITORY}/releases" \
              -d "{
                \"tag_name\": \"${TAG}\",
                \"target_commitish\": \"master\",
                \"name\": \"Fuel ${TAG}\",
                \"body\": \"Release ${TAG} of the Fuel package manager for Rockit.\",
                \"draft\": false,
                \"prerelease\": false
              }" | jq -r '.id')
            echo "Release created: ID=${RELEASE_ID}"
          else
            echo "Release already exists: ID=${RELEASE_ID}"
          fi

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "ERROR: Failed to get/create release"
            exit 1
          fi

          UPLOAD_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/gzip" \
            --data-binary "@dist/${ARCHIVE}" \
            "${API}/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=${ARCHIVE}")
          HTTP_CODE=$(echo "$UPLOAD_RESPONSE" | tail -1)

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "ERROR: Upload failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Successfully uploaded: ${ARCHIVE}"
        env:
          GITHUB_TOKEN: ${{ gitea.token }}
