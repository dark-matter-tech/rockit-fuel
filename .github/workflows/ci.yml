name: CI

on:
  push:
    branches: [develop, staging, master]
  pull_request:
    branches: [develop, staging, master]

env:
  ROCKIT_COMPILER: command
  ROCKIT_RUNTIME: /usr/local/lib/rockit/rockit_runtime.c

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Fuel
        run: |
          $ROCKIT_COMPILER build-native src/fuel.rok -o fuel --runtime-path $ROCKIT_RUNTIME

      - name: Test — fuel version
        run: ./fuel version | grep -q "0.1.0"

      - name: Test — fuel help
        run: ./fuel help

      - name: Test — fuel init
        run: |
          cd /tmp
          $GITHUB_WORKSPACE/fuel init test-project
          test -f test-project/Fuel.toml
          test -f test-project/src/main.rok
          test -f test-project/README.md
          grep -q "test-project" test-project/Fuel.toml

      - name: Test — fuel build
        run: |
          cd /tmp/test-project
          $GITHUB_WORKSPACE/fuel build
          test -f build/test-project

      - name: Test — fuel run
        run: |
          cd /tmp/test-project
          $GITHUB_WORKSPACE/fuel run 2>&1 | grep -q "Hello, Rockit!"

      - name: Test — error no Fuel.toml
        run: |
          cd /tmp
          $GITHUB_WORKSPACE/fuel build 2>&1 | grep -q "Fuel.toml"

      - name: Test — error unknown command
        run: ./fuel badcommand 2>&1 | grep -q "unknown command"
