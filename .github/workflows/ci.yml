name: CI

on:
  push:
  pull_request:
    branches: [develop, beta, master, staging]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    container: wrightwingman/rockit-compiler:rc
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          echo "machine ${GITHUB_SERVER_URL#https://} login x-access-token password ${GITHUB_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git clone --depth 1 --recurse-submodules --branch "${BRANCH}" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" .
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build runtime
        run: |
          git clone --depth 1 https://github.com/dark-matter-tech/rockit-runtime.git /tmp/runtime
          cd /tmp/runtime && bash rockit/build.sh && cd -
          mkdir -p /usr/local/share/rockit
          cp /tmp/runtime/rockit/rockit_runtime.o /usr/local/share/rockit/

      - name: Build Fuel
        run: |
          /usr/local/bin/rockit build-native src/fuel.rok -o fuel --runtime-path /usr/local/share/rockit/rockit_runtime.o

      - name: Test -- rockit version
        run: /usr/local/bin/rockit version

      # --- version / help ---

      - name: Test -- version
        run: ./fuel version | grep -q "0.3.0"

      - name: Test -- --version alias
        run: ./fuel --version | grep -q "0.3.0"

      - name: Test -- -v alias
        run: ./fuel -v | grep -q "0.3.0"

      - name: Test -- help
        run: ./fuel help | grep -q "USAGE:"

      - name: Test -- help -- lists update command
        run: ./fuel help | grep -q "update"

      - name: Test -- help -- lists list command
        run: ./fuel help | grep -q "list"

      - name: Test -- --help alias
        run: ./fuel --help | grep -q "USAGE:"

      - name: Test -- -h alias
        run: ./fuel -h | grep -q "USAGE:"

      - name: Test -- no args shows help
        run: ./fuel | grep -q "USAGE:"

      # --- init ---

      - name: Test -- init
        run: |
          cd /tmp
          $GITHUB_WORKSPACE/fuel init test-project
          test -f test-project/Fuel.toml
          test -f test-project/src/main.rok
          test -f test-project/README.md
          grep -q "test-project" test-project/Fuel.toml

      # --- build / run / clean ---

      - name: Test -- build
        run: |
          cd /tmp/test-project
          $GITHUB_WORKSPACE/fuel build --compiler-path /usr/local/bin/rockit --runtime-path /usr/local/share/rockit/rockit_runtime.o
          test -f build/test-project

      - name: Test -- run
        run: |
          cd /tmp/test-project
          $GITHUB_WORKSPACE/fuel run --compiler-path /usr/local/bin/rockit --runtime-path /usr/local/share/rockit/rockit_runtime.o 2>&1 | grep -q "Hello, Rockit!"

      - name: Test -- clean
        run: |
          cd /tmp/test-project
          test -d build
          $GITHUB_WORKSPACE/fuel clean
          test ! -d build

      # --- install ---

      - name: Test -- install -- no dependencies
        run: |
          cd /tmp/test-project
          $GITHUB_WORKSPACE/fuel install 2>&1 | grep -q "No dependencies to install"

      # --- list ---

      - name: Test -- list -- no dependencies
        run: |
          cd /tmp/test-project
          $GITHUB_WORKSPACE/fuel list 2>&1 | grep -q "No dependencies"

      # --- update ---

      - name: Test -- update -- no dependencies
        run: |
          cd /tmp/test-project
          $GITHUB_WORKSPACE/fuel update 2>&1 | grep -q "No dependencies to update"

      # --- add ---

      - name: Test -- add -- no args error
        run: |
          cd /tmp/test-project
          $GITHUB_WORKSPACE/fuel add 2>&1 | grep -q "package name required"

      - name: Test -- add -- missing source error
        run: |
          cd /tmp/test-project
          $GITHUB_WORKSPACE/fuel add mylib 2>&1 | grep -q "\-\-git"

      - name: Test -- add -- local path dependency
        run: |
          mkdir -p /tmp/local-pkg/src
          cat > /tmp/local-pkg/Fuel.toml << 'TOML'
          [package]
          name = local-pkg
          version = 0.1.0
          TOML
          cd /tmp/test-project
          $GITHUB_WORKSPACE/fuel add locallib --path /tmp/local-pkg
          grep -q "locallib" Fuel.toml

      # --- remove ---

      - name: Test -- remove -- existing dependency
        run: |
          cd /tmp/test-project
          $GITHUB_WORKSPACE/fuel remove locallib 2>&1 | grep -q "Removed locallib"
          ! grep -q "locallib" Fuel.toml

      - name: Test -- remove -- no args error
        run: |
          cd /tmp/test-project
          $GITHUB_WORKSPACE/fuel remove 2>&1 | grep -q "package name required"

      - name: Test -- remove -- nonexistent dependency
        run: |
          cd /tmp/test-project
          $GITHUB_WORKSPACE/fuel remove nonexistent 2>&1 | grep -q "not found"

      # --- cache-clean ---

      - name: Test -- cache-clean
        run: $GITHUB_WORKSPACE/fuel cache-clean 2>&1 | grep -q "Cleaned package cache"

      # --- error cases ---

      - name: Test -- error -- no Fuel.toml
        run: |
          cd /tmp
          $GITHUB_WORKSPACE/fuel build 2>&1 | grep -q "Fuel.toml"

      - name: Test -- error -- unknown command
        run: ./fuel badcommand 2>&1 | grep -q "unknown command"
