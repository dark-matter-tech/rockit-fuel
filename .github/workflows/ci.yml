name: CI

on:
  push:
    branches: [develop, staging, master]
  pull_request:
    branches: [develop, staging, master]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    container: rustygits.com/dark-matter/rockit-builder:latest

    steps:
      - name: Checkout Fuel
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          echo "machine ${GITHUB_SERVER_URL#https://} login x-access-token password ${GITHUB_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git clone --depth 1 --branch "${BRANCH}" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" .
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build Fuel
        run: $ROCKIT_COMPILER build-native src/fuel.rok -o fuel --runtime-path $ROCKIT_RUNTIME

      - name: Test — fuel version
        run: ./fuel version | grep -q "0.1.0"

      - name: Test — fuel help
        run: ./fuel help

      - name: Test — fuel init
        run: |
          cd /tmp
          $GITHUB_WORKSPACE/fuel init test-project
          test -f test-project/Fuel.toml
          test -f test-project/src/main.rok
          test -f test-project/README.md
          grep -q "test-project" test-project/Fuel.toml

      - name: Test — fuel build
        run: |
          cd /tmp/test-project
          $GITHUB_WORKSPACE/fuel build --compiler-path $ROCKIT_COMPILER --runtime-path $ROCKIT_RUNTIME
          test -f build/test-project

      - name: Test — fuel run
        run: |
          cd /tmp/test-project
          $GITHUB_WORKSPACE/fuel run --compiler-path $ROCKIT_COMPILER --runtime-path $ROCKIT_RUNTIME 2>&1 | grep -q "Hello, Rockit!"

      - name: Test — error no Fuel.toml
        run: |
          cd /tmp
          $GITHUB_WORKSPACE/fuel build 2>&1 | grep -q "Fuel.toml"

      - name: Test — error unknown command
        run: ./fuel badcommand 2>&1 | grep -q "unknown command"
