name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.3.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    container: swift:5.10.1-jammy

    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y git clang-15 curl jq
          ln -sf /usr/bin/clang-15 /usr/bin/clang

      - name: Checkout
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          echo "machine ${GITHUB_SERVER_URL#https://} login x-access-token password ${GITHUB_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          git clone --depth 1 --branch master "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" .
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Set version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
            echo "TAG=v${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            VERSION=$(grep -oP 'FUEL_VERSION\(\).*?"(\K[0-9]+\.[0-9]+\.[0-9]+)' src/fuel.rok || echo "0.0.0")
            echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
            echo "TAG=v${VERSION}" >> "$GITHUB_ENV"
          fi
          echo "Releasing version: ${VERSION}"

      - name: Download Rockit compiler
        run: |
          ROCKIT_VERSION="0.1.1"
          ARCHIVE="rockit-${ROCKIT_VERSION}-linux-x86_64.tar.gz"
          curl -fsSL -H "Authorization: token ${FUEL_TOKEN}" -o "/tmp/${ARCHIVE}" \
            "${GITHUB_SERVER_URL}/Dark-Matter/moon/releases/download/v${ROCKIT_VERSION}/${ARCHIVE}"
          tar -xzf "/tmp/${ARCHIVE}" -C /tmp
          ROCKIT_DIR="/tmp/rockit-${ROCKIT_VERSION}-linux-x86_64/rockit"
          echo "COMPILER=${ROCKIT_DIR}/bin/rockit" >> "$GITHUB_ENV"
          echo "RUNTIME=${ROCKIT_DIR}/share/rockit/rockit_runtime.c" >> "$GITHUB_ENV"
          chmod +x "${ROCKIT_DIR}/bin/rockit"
          ${ROCKIT_DIR}/bin/rockit version
        env:
          FUEL_TOKEN: ${{ secrets.FUEL_TOKEN }}

      - name: Build Fuel
        run: |
          $COMPILER build-native src/fuel.rok -o fuel --runtime-path $RUNTIME
          ./fuel version

      - name: Package Linux x86_64
        run: |
          ARCHIVE="fuel-${VERSION}-linux-x86_64.tar.gz"
          mkdir -p dist/fuel-${VERSION}-linux-x86_64/fuel/bin
          cp fuel dist/fuel-${VERSION}-linux-x86_64/fuel/bin/fuel
          chmod +x dist/fuel-${VERSION}-linux-x86_64/fuel/bin/fuel
          cd dist && tar -czf "${ARCHIVE}" "fuel-${VERSION}-linux-x86_64"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
          ls -la "${ARCHIVE}"

      - name: Upload to release
        run: |
          GITEA_URL="${GITHUB_SERVER_URL}"
          API="${GITEA_URL}/api/v1"
          ARCHIVE="fuel-${VERSION}-linux-x86_64.tar.gz"

          # Check if release already exists for this tag
          RELEASE_ID=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" \
            "${API}/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" \
            | jq -r '.id // empty')

          if [ -z "$RELEASE_ID" ]; then
            RELEASE_ID=$(curl -s -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Content-Type: application/json" \
              "${API}/repos/${GITHUB_REPOSITORY}/releases" \
              -d "{
                \"tag_name\": \"${TAG}\",
                \"target_commitish\": \"master\",
                \"name\": \"Fuel ${TAG}\",
                \"body\": \"Release ${TAG} of the Fuel package manager for Rockit.\\n\\n## Install\\n\\n\\\`\\\`\\\`bash\\ntar -xzf fuel-${VERSION}-linux-x86_64.tar.gz\\ncp fuel-${VERSION}-linux-x86_64/fuel/bin/fuel /usr/local/bin/\\n\\\`\\\`\\\`\\n\\n## Platforms\\n\\n- Linux x86_64 (prebuilt)\\n- macOS (build from source)\",
                \"draft\": false,
                \"prerelease\": false
              }" | jq -r '.id')
            echo "Release created: ID=${RELEASE_ID}"
          else
            echo "Release already exists: ID=${RELEASE_ID}"
          fi

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "ERROR: Failed to get/create release"
            exit 1
          fi

          UPLOAD_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/gzip" \
            --data-binary "@dist/${ARCHIVE}" \
            "${API}/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=${ARCHIVE}")
          HTTP_CODE=$(echo "$UPLOAD_RESPONSE" | tail -1)
          BODY=$(echo "$UPLOAD_RESPONSE" | head -n -1)

          echo "Upload response (HTTP $HTTP_CODE):"
          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "ERROR: Upload failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Successfully uploaded: ${ARCHIVE}"
        env:
          GITHUB_TOKEN: ${{ github.token }}
