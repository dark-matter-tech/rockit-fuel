name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.3.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    container: swift:5.10.1-jammy

    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y git clang-15 curl jq libssl-dev pkg-config
          ln -sf /usr/bin/clang-15 /usr/bin/clang

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
            echo "TAG=v${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            VERSION=$(grep -oP 'FUEL_VERSION\(\).*?"(\K[0-9]+\.[0-9]+\.[0-9]+)' src/fuel.rok || echo "0.0.0")
            echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
            echo "TAG=v${VERSION}" >> "$GITHUB_ENV"
          fi
          echo "Releasing version: ${VERSION}"

      - name: Build Rockit compiler from source
        run: |
          git clone --depth 1 https://github.com/dark-matter-tech/rockit-booster.git /tmp/stage0
          cd /tmp/stage0 && swift build -c release

          git clone --depth 1 --recurse-submodules https://github.com/dark-matter-tech/rockit-compiler.git /tmp/rockit-compiler

          cd /tmp/rockit-compiler && bash src/build.sh
          /tmp/stage0/.build/release/rockit build-native src/command.rok

          cd /tmp/rockit-compiler && bash runtime/rockit/build.sh

          chmod +x /tmp/rockit-compiler/src/command
          echo "COMPILER=/tmp/rockit-compiler/src/command" >> "$GITHUB_ENV"
          echo "RUNTIME=/tmp/rockit-compiler/runtime/rockit_runtime.o" >> "$GITHUB_ENV"
          /tmp/rockit-compiler/src/command version

      - name: Build Fuel
        run: |
          $COMPILER build-native src/fuel.rok -o fuel --runtime-path $RUNTIME
          ./fuel version

      - name: Package Linux x86_64
        run: |
          ARCHIVE="fuel-${VERSION}-linux-x86_64.tar.gz"
          mkdir -p dist/fuel-${VERSION}-linux-x86_64/fuel/bin
          cp fuel dist/fuel-${VERSION}-linux-x86_64/fuel/bin/fuel
          chmod +x dist/fuel-${VERSION}-linux-x86_64/fuel/bin/fuel
          cd dist && tar -czf "${ARCHIVE}" "fuel-${VERSION}-linux-x86_64"
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
          ls -la "${ARCHIVE}"

      - name: Upload to release
        run: |
          API="https://api.github.com/repos/${GITHUB_REPOSITORY}"

          # Delete existing release if present
          EXISTING=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" \
            "${API}/releases/tags/${TAG}" | jq -r '.id // empty')
          if [ -n "$EXISTING" ]; then
            curl -s -X DELETE -H "Authorization: token ${GITHUB_TOKEN}" \
              "${API}/releases/${EXISTING}"
            echo "Deleted existing release ${TAG}"
          fi

          # Create release
          RELEASE_ID=$(curl -s -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            "${API}/releases" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"Fuel ${TAG}\",\"body\":\"Release ${TAG} of the Fuel package manager for Rockit.\"}" \
            | jq -r '.id')

          # Upload asset
          curl -s -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/gzip" \
            --data-binary "@dist/${ARCHIVE}" \
            "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=${ARCHIVE}"

          echo "Successfully uploaded: ${ARCHIVE}"
        env:
          GITHUB_TOKEN: ${{ github.token }}
